<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI - Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        .chat-container { height: calc(100vh - 140px); }
        @media (max-width: 640px) { .chat-container { height: calc(100vh - 120px); } }

        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        
        .msg-user-anim { animation: slideInRight 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .msg-ai-anim { animation: slideInLeft 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        .ai-message pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 8px; overflow-x: auto; margin-top: 8px; margin-bottom: 8px; font-family: monospace; font-size: 0.9em; }
        .ai-message code { font-family: monospace; background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 4px; }
        .ai-message pre code { background: transparent; padding: 0; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen overflow-hidden antialiased">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 py-4 px-6 flex justify-between items-center z-10 sticky top-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white shadow-md">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div>
                <h1 class="text-lg font-semibold text-slate-800 leading-tight">Qwen 2.5 (14B)</h1>
                <p class="text-xs text-green-500 font-medium flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Online (Local)
                </p>
            </div>
        </div>
        <a href="/admin" target="_blank" class="text-slate-400 hover:text-slate-600 transition-colors" title="Открыть админку">
            <i class="fa-solid fa-server text-xl"></i>
        </a>
    </header>

    <!-- Main Chat Area -->
    <main id="chat-box" class="chat-container overflow-y-auto p-4 sm:p-6 w-full max-w-4xl mx-auto flex flex-col gap-6 scroll-smooth">
        
        <div class="flex flex-col items-center justify-center h-full text-center" id="welcome-screen">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl mb-4 shadow-sm">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-700 mb-2">Робочий асистент готовий</h2>
            <p class="text-slate-500 max-w-md">Модель завантажено в ОЗУ. Напишіть запит щоб почати</p>
        </div>

    </main>

    <!-- Input Area -->
    <footer class="bg-white border-t border-slate-200 p-4 sm:px-6 shrink-0 z-10">
        <div class="max-w-4xl mx-auto flex items-end gap-3 relative">
            <textarea id="msg-input" rows="1" 
                class="w-full bg-slate-100 text-slate-800 border-none rounded-2xl py-3 px-5 pr-14 focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all resize-none overflow-hidden placeholder-slate-400 text-base" 
                placeholder="Задай вопрос ИИ..."
                oninput="this.style.height = ''; this.style.height = Math.min(this.scrollHeight, 120) + 'px'"></textarea>
            
            <button id="send-btn" onclick="sendMessage()" 
                class="absolute right-2 bottom-2 w-10 h-10 bg-blue-600 hover:bg-blue-700 text-white rounded-full flex items-center justify-center shadow-md transition-transform transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-paper-plane text-sm ml-[-2px]"></i>
            </button>
        </div>
        <p class="text-center text-xs text-slate-400 mt-2">AI може робити помилки. Перевіряйте важливу інформацію</p>
    </footer>

    <script>
        const wsUrl = `ws://${window.location.host}/ws/chat`;
        const ws = new WebSocket(wsUrl);
        const chatBox = document.getElementById("chat-box");
        const msgInput = document.getElementById("msg-input");
        const sendBtn = document.getElementById("send-btn");
        const welcomeScreen = document.getElementById("welcome-screen");
        
        let currentAiMessageDiv = null;
        let charQueue = [];
        let isTyping = false;
        let isGenerating = false;
        let rawAiResponse = "";

        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function formatMessage(text) {
            let formatted = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            formatted = formatted.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
            formatted = formatted.replace(/\n/g, "<br>");
            
            return formatted;
        }

        function processQueue() {
            if (charQueue.length > 0 && currentAiMessageDiv) {
                const char = charQueue.shift();
                rawAiResponse += char;
                currentAiMessageDiv.innerHTML = formatMessage(rawAiResponse);
                
                chatBox.scrollTop = chatBox.scrollHeight;
                
                setTimeout(processQueue, 15);
            } else {
                isTyping = false;
                if (!isGenerating) {
                    sendBtn.disabled = false;
                }
            }
        }

        ws.onmessage = function(event) {
            if (event.data === "[START]") {
                isGenerating = true;
                rawAiResponse = "";
                
                const typingIndicator = document.getElementById("typing-indicator");
                if(typingIndicator) typingIndicator.remove();

                const wrapper = document.createElement("div");
                wrapper.className = "flex w-full msg-ai-anim";
                wrapper.innerHTML = `
                    <div class="flex gap-3 max-w-[85%] sm:max-w-[75%]">
                        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white shrink-0 mt-1 shadow-sm text-sm">
                            <i class="fa-solid fa-robot"></i>
                        </div>
                        <div class="bg-white border border-slate-200 text-slate-800 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm ai-message text-[15px] leading-relaxed">
                            <span id="current-ai-text"></span>
                        </div>
                    </div>
                `;
                chatBox.appendChild(wrapper);
                currentAiMessageDiv = wrapper.querySelector("#current-ai-text");
                chatBox.scrollTop = chatBox.scrollHeight;

            } else if (event.data === "[END]") {
                isGenerating = false;
                currentAiMessageDiv = null;
            } else {
                const chars = event.data.split('');
                charQueue.push(...chars);
                if (!isTyping && currentAiMessageDiv) {
                    isTyping = true;
                    processQueue();
                }
            }
        };

        function showTypingIndicator() {
            const wrapper = document.createElement("div");
            wrapper.id = "typing-indicator";
            wrapper.className = "flex w-full msg-ai-anim";
            wrapper.innerHTML = `
                <div class="flex gap-3 max-w-[80%]">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white shrink-0 mt-1 shadow-sm text-sm">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl rounded-tl-sm px-4 py-4 shadow-sm flex items-center gap-1.5 h-[46px]">
                        <div class="w-2 h-2 bg-slate-400 rounded-full typing-dot"></div>
                        <div class="w-2 h-2 bg-slate-400 rounded-full typing-dot"></div>
                        <div class="w-2 h-2 bg-slate-400 rounded-full typing-dot"></div>
                    </div>
                </div>
            `;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || isGenerating || isTyping) return;

            if (welcomeScreen) welcomeScreen.style.display = 'none';

            sendBtn.disabled = true;
            msgInput.value = "";
            msgInput.style.height = 'auto';

            const userWrapper = document.createElement("div");
            userWrapper.className = "flex w-full justify-end msg-user-anim";
            
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
            
            userWrapper.innerHTML = `
                <div class="bg-blue-600 text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[85%] sm:max-w-[75%] shadow-md text-[15px] leading-relaxed">
                    ${safeText}
                </div>
            `;
            chatBox.appendChild(userWrapper);
            chatBox.scrollTop = chatBox.scrollHeight;

            showTypingIndicator();

            ws.send(text);
        }

        ws.onclose = () => {
            console.error("WebSocket отключен");
            document.querySelector("header h1").nextElementSibling.innerHTML = <span class="w-2 h-2 rounded-full bg-red-500"></span> Offline;
            document.querySelector("header h1").nextElementSibling.classList.replace("text-green-500", "text-red-500");
        };
      </script>
</body>
</html>
